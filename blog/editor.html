<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Редактор блога — Ecostroydom</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F6F5F2;color:#1A1A1A;line-height:1.55}
a{color:#2A7A5F;text-decoration:none}
a:hover{text-decoration:underline}

.top{background:#1A1A1A;color:#fff;padding:14px 0}
.top__inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.top__logo{font-family:'Manrope';font-size:18px;font-weight:800;color:#fff}
.top__logo b{color:#2A7A5F}
.top__back{color:rgba(255,255,255,.6);font-size:13px;font-weight:600}
.top__back:hover{color:#fff;text-decoration:none}

.wrap{max-width:1100px;margin:0 auto;padding:32px 24px}
h1{font-family:'Manrope';font-size:28px;font-weight:800;margin-bottom:24px}

/* List */
.post-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.post-item{display:flex;align-items:center;gap:16px;padding:16px;background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,.06);cursor:pointer;transition:.2s}
.post-item:hover{border-color:#2A7A5F;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.post-item img{width:80px;height:56px;object-fit:cover;border-radius:8px;background:#eee}
.post-item__info{flex:1;min-width:0}
.post-item__info h3{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-item__info p{font-size:12px;color:#999;margin-top:2px}
.post-item__actions{display:flex;gap:6px}
.post-item__actions button{padding:8px 14px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.post-item__actions button:hover{background:#f5f5f5}
.post-item__actions .del{color:#e74c3c;border-color:#fdd}
.post-item__actions .del:hover{background:#fee}

.btn{padding:12px 24px;border:0;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;transition:.2s}
.btn-primary{background:#1A1A1A;color:#fff}
.btn-primary:hover{background:#333}
.btn-accent{background:#2A7A5F;color:#fff}
.btn-accent:hover{background:#1F5F49}
.btn-ghost{background:#fff;color:#333;border:1px solid #e0e0e0}
.btn-ghost:hover{background:#f5f5f5}
.btn-block{width:100%}

/* Editor */
.editor{display:none;background:#fff;border-radius:16px;padding:32px;border:1px solid rgba(0,0,0,.06);margin-top:24px}
.editor.active{display:block}
.editor h2{font-family:'Manrope';font-size:22px;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#555}
.field input,.field textarea,.field select{width:100%;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;transition:.2s}
.field input:focus,.field textarea:focus{border-color:#2A7A5F;outline:none}
.field textarea{min-height:120px;resize:vertical}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Photo manager */
.photos{margin:16px 0}
.photos__grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:12px}
.photos__item{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:4/3;background:#f5f5f5}
.photos__item img{width:100%;height:100%;object-fit:cover}
.photos__item button{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:0;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.photos__item button:hover{background:#e74c3c}
.photos__add{display:flex;gap:8px;align-items:center}
.photos__add input[type="file"]{display:none}
.photos__add-btn{padding:10px 16px;border:2px dashed #ddd;border-radius:10px;cursor:pointer;font-size:13px;color:#999;transition:.15s;background:#fff}
.photos__add-btn:hover{border-color:#2A7A5F;color:#2A7A5F}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-top:10px;padding:8px;background:#f8f8f8;border-radius:8px;flex-wrap:wrap}
.toolbar button{padding:6px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.toolbar button:hover{background:#eee}

/* Preview */
.preview{margin-top:20px;padding:24px;border:1px solid #eee;border-radius:12px;background:#fafafa}
.preview h3{font-size:16px;margin-bottom:12px;color:#999}
.preview__content{font-size:15px;line-height:1.8;color:#333}
.preview__content h2,.preview__content h3{margin:20px 0 10px;color:#1A1A1A}
.preview__content img{max-width:100%;border-radius:8px;margin:12px 0}
.preview__content p{margin-bottom:12px}
.preview__content ul,.preview__content ol{padding-left:20px;margin-bottom:12px}
.preview__content table{width:100%;border-collapse:collapse;margin:12px 0}
.preview__content th,.preview__content td{padding:8px 12px;border:1px solid #eee;text-align:left;font-size:13px}

.toast{position:fixed;bottom:24px;right:24px;background:#1A1A1A;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;display:none;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.toast.show{display:block}

@media(max-width:768px){
  .field-row{grid-template-columns:1fr}
  .post-item{flex-direction:column;align-items:flex-start}
  .post-item img{width:100%;height:auto;aspect-ratio:16/9}
}
</style>
</head>
<body>

<div class="top">
  <div class="top__inner">
    <div class="top__logo" id="editorLogo">Eco<b>StroyDom</b> · Блог</div>
    <a href="../index.html" class="top__back">← На главную</a>
  </div>
</div>

<div class="wrap">
  <h1>Редактор блога</h1>

  <div class="post-list" id="postList"></div>
  <button class="btn btn-accent" id="addPost">+ Новая статья</button>

  <div class="editor" id="editor">
    <h2 id="editorTitle">Новая статья</h2>

    <div class="field-row">
      <div class="field"><label>Заголовок</label><input id="eTitle" placeholder="Как выбрать газоблок..."></div>
      <div class="field"><label>Категория</label><input id="eCat" placeholder="Материалы"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Дата</label><input id="eDate" type="date"></div>
      <div class="field"><label>Ссылка (URL страницы)</label><input id="eUrl" placeholder="blog/my-article.html"></div>
    </div>
    <div class="field"><label>Краткое описание (для SEO и карточки)</label><textarea id="eExcerpt" rows="2" placeholder="2-3 предложения..."></textarea></div>

    <div class="field">
      <label>Обложка статьи</label>
      <div class="photos">
        <div id="coverPreview"></div>
        <div class="photos__add">
          <input type="file" accept="image/*" id="coverFile">
          <button type="button" class="photos__add-btn" id="coverBtn">Загрузить обложку</button>
          <input id="coverUrl" placeholder="или URL изображения" style="flex:1;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px">
        </div>
      </div>
    </div>

    <div class="field">
      <label>Текст статьи (HTML)</label>
      <div class="toolbar" id="toolbar">
        <button data-wrap="h2">H2</button>
        <button data-wrap="h3">H3</button>
        <button data-wrap="p">Абзац</button>
        <button data-wrap="b">Жирный</button>
        <button data-wrap="ul">Список</button>
        <button data-insert="img">Фото</button>
        <button data-insert="table">Таблица</button>
      </div>
      <textarea id="eBody" rows="16" placeholder="<h2>Заголовок</h2><p>Текст...</p>"></textarea>
    </div>

    <div class="field">
      <label>Фотографии статьи</label>
      <div class="photos">
        <div class="photos__grid" id="photosGrid"></div>
        <div class="photos__add">
          <input type="file" accept="image/*" id="photoFile" multiple>
          <button type="button" class="photos__add-btn" id="photoBtn">+ Добавить фото</button>
          <input id="photoUrl" placeholder="или URL" style="flex:1;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px">
          <button type="button" class="btn btn-ghost" id="photoUrlAdd" style="font-size:12px">Добавить</button>
        </div>
      </div>
    </div>

    <div class="preview">
      <h3>Предпросмотр</h3>
      <div class="preview__content" id="preview"></div>
    </div>

    <div style="display:flex;gap:10px;margin-top:24px">
      <button class="btn btn-accent" id="eSave">Сохранить статью</button>
      <button class="btn btn-ghost" id="eCancel">Отмена</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Сохранено</div>

<script>
(function(){
'use strict';
var SK='ecostroydom_admin';
var WA='77757862515';

function load(){try{var d=localStorage.getItem(SK);return d?JSON.parse(d):null;}catch(e){return null;}}
function saveAll(s){localStorage.setItem(SK,JSON.stringify(s));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

var DEFAULT_POSTS=[
  {id:1,title:'Как выбрать газоблок: D500 vs D600',cat:'Материалы',date:'2026-04-12',img:'assets/img/block-200.jpg',excerpt:'Разбираем ключевые отличия двух популярных марок газобетона.',body:'',url:'blog/d500-vs-d600.html',photos:[]},
  {id:2,title:'Сколько газоблока нужно на дом 100 м²',cat:'Расчёты',date:'2026-04-08',img:'assets/img/hero-house.jpg',excerpt:'Считаем кубатуру стен и перегородок.',body:'',url:'blog/skolko-gazobloka-na-dom-100m2.html',photos:[]},
  {id:3,title:'Какой клей для газоблока лучше',cat:'Советы',date:'2026-04-02',img:'assets/img/glue-expert.jpg',excerpt:'Сравниваем 5 марок клея в Казахстане.',body:'',url:'blog/klej-dlya-gazobloka-obzor.html',photos:[]},
  {id:4,title:'Какой толщины должна быть стена из газоблока',cat:'Советы',date:'2026-03-28',img:'assets/img/block-400.jpg',excerpt:'Оптимальная толщина для Казахстана: 200, 300 или 400 мм.',body:'',url:'blog/tolschina-steny-gazoblok.html',photos:[]},
  {id:5,title:'Плюсы и минусы газоблока — честный обзор',cat:'Материалы',date:'2026-03-20',img:'assets/img/autoclave.jpg',excerpt:'Все достоинства и недостатки газобетона.',body:'',url:'blog/plyusy-i-minusy-gazobloka.html',photos:[]}
];

var state=load()||{};
if(!state.blogPosts||!Array.isArray(state.blogPosts)||state.blogPosts.length===0){
  state.blogPosts=DEFAULT_POSTS;
  saveAll(state);
}

var editIdx=null; // null = new, number = editing index
var currentPhotos=[]; // [{src:'...'}]
var coverImg='';

function renderList(){
  var list=document.getElementById('postList');
  list.innerHTML='';
  state.blogPosts.forEach(function(p,i){
    var div=document.createElement('div');div.className='post-item';
    var imgSrc=p.img?(p.img.startsWith('data:')?p.img:'../'+p.img):'';
    div.innerHTML='<img src="'+esc(imgSrc)+'" alt="">'+
      '<div class="post-item__info"><h3>'+esc(p.title||'Без заголовка')+'</h3><p>'+esc(p.date)+' · '+esc(p.cat)+(p.url?' · <a href="../'+esc(p.url)+'" target="_blank">Открыть</a>':'')+'</p></div>'+
      '<div class="post-item__actions"><button data-edit="'+i+'">Редактировать</button><button class="del" data-del="'+i+'">Удалить</button></div>';
    list.appendChild(div);
  });
  // Bind
  list.querySelectorAll('[data-edit]').forEach(function(b){
    b.addEventListener('click',function(e){e.stopPropagation();openEditor(+b.dataset.edit);});
  });
  list.querySelectorAll('[data-del]').forEach(function(b){
    b.addEventListener('click',function(e){
      e.stopPropagation();
      if(!confirm('Удалить статью "'+state.blogPosts[+b.dataset.del].title+'"?'))return;
      state.blogPosts.splice(+b.dataset.del,1);
      saveAll(state);renderList();toast('Статья удалена');
    });
  });
}

function openEditor(idx){
  editIdx=idx;
  var p=idx!==null?state.blogPosts[idx]:{title:'',cat:'',date:new Date().toISOString().slice(0,10),url:'',excerpt:'',body:'',img:'',photos:[]};
  document.getElementById('editorTitle').textContent=idx!==null?'Редактировать статью':'Новая статья';
  document.getElementById('eTitle').value=p.title||'';
  document.getElementById('eCat').value=p.cat||'';
  document.getElementById('eDate').value=p.date||'';
  document.getElementById('eUrl').value=p.url||'';
  document.getElementById('eExcerpt').value=p.excerpt||'';
  document.getElementById('eBody').value=p.body||'';
  coverImg=p.img||'';
  currentPhotos=(p.photos||[]).slice();
  renderCover();
  renderPhotos();
  updatePreview();
  document.getElementById('editor').classList.add('active');
  document.getElementById('editor').scrollIntoView({behavior:'smooth'});
}

function closeEditor(){
  document.getElementById('editor').classList.remove('active');
  editIdx=null;
}

function renderCover(){
  var wrap=document.getElementById('coverPreview');
  if(coverImg){
    var src=coverImg.startsWith('data:')?coverImg:'../'+coverImg;
    wrap.innerHTML='<div class="photos__item" style="max-width:240px"><img src="'+src+'" alt=""><button id="coverDel">&times;</button></div>';
    document.getElementById('coverDel').addEventListener('click',function(){coverImg='';renderCover();});
  } else {
    wrap.innerHTML='';
  }
}

function renderPhotos(){
  var grid=document.getElementById('photosGrid');
  grid.innerHTML='';
  currentPhotos.forEach(function(p,i){
    var src=p.src.startsWith('data:')?p.src:'../'+p.src;
    grid.innerHTML+='<div class="photos__item"><img src="'+esc(src)+'" alt=""><button data-pdel="'+i+'">&times;</button></div>';
  });
  grid.querySelectorAll('[data-pdel]').forEach(function(b){
    b.addEventListener('click',function(){currentPhotos.splice(+b.dataset.pdel,1);renderPhotos();});
  });
}

function updatePreview(){
  var body=document.getElementById('eBody').value;
  document.getElementById('preview').innerHTML=body||'<p style="color:#ccc">Введите текст статьи...</p>';
}

function savePost(){
  var data={
    id:editIdx!==null&&state.blogPosts[editIdx]?state.blogPosts[editIdx].id:Date.now(),
    title:document.getElementById('eTitle').value.trim(),
    cat:document.getElementById('eCat').value.trim(),
    date:document.getElementById('eDate').value,
    url:document.getElementById('eUrl').value.trim(),
    excerpt:document.getElementById('eExcerpt').value.trim(),
    body:document.getElementById('eBody').value,
    img:coverImg,
    photos:currentPhotos
  };
  if(!data.title){alert('Введите заголовок');return;}
  if(editIdx!==null) state.blogPosts[editIdx]=data;
  else state.blogPosts.push(data);
  saveAll(state);
  closeEditor();renderList();toast('Статья сохранена');
}

function fileToDataUrl(file,cb){
  var r=new FileReader();r.onload=function(e){cb(e.target.result);};r.readAsDataURL(file);
}

function toast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

// Init
renderList();
// Set logo name from state
if(state.companyName){
  var n=state.companyName;
  var logo=document.getElementById('editorLogo');
  if(logo&&n.length>3) logo.innerHTML=n.substring(0,3)+'<b>'+n.substring(3)+'</b> · Блог';
}

// Add post
document.getElementById('addPost').addEventListener('click',function(){openEditor(null);});

// Cancel
document.getElementById('eCancel').addEventListener('click',closeEditor);

// Save
document.getElementById('eSave').addEventListener('click',savePost);

// Cover upload
document.getElementById('coverBtn').addEventListener('click',function(){document.getElementById('coverFile').click();});
document.getElementById('coverFile').addEventListener('change',function(){
  if(!this.files[0])return;
  fileToDataUrl(this.files[0],function(d){coverImg=d;renderCover();});
});
// Cover URL
document.getElementById('coverUrl').addEventListener('change',function(){
  if(this.value.trim()){coverImg=this.value.trim();renderCover();this.value='';}
});

// Photo upload
document.getElementById('photoBtn').addEventListener('click',function(){document.getElementById('photoFile').click();});
document.getElementById('photoFile').addEventListener('change',function(){
  Array.from(this.files).forEach(function(f){
    fileToDataUrl(f,function(d){currentPhotos.push({src:d});renderPhotos();});
  });
});
// Photo URL
document.getElementById('photoUrlAdd').addEventListener('click',function(){
  var url=document.getElementById('photoUrl').value.trim();
  if(url){currentPhotos.push({src:url});renderPhotos();document.getElementById('photoUrl').value='';}
});

// Toolbar
document.querySelectorAll('[data-wrap]').forEach(function(b){
  b.addEventListener('click',function(){
    var tag=b.dataset.wrap;
    var ta=document.getElementById('eBody');
    var start=ta.selectionStart,end=ta.selectionEnd;
    var sel=ta.value.substring(start,end)||'текст';
    if(tag==='ul'){
      ta.value=ta.value.substring(0,start)+'<ul>\n  <li>'+sel+'</li>\n</ul>'+ta.value.substring(end);
    } else {
      ta.value=ta.value.substring(0,start)+'<'+tag+'>'+sel+'</'+tag+'>'+ta.value.substring(end);
    }
    ta.focus();updatePreview();
  });
});
document.querySelectorAll('[data-insert]').forEach(function(b){
  b.addEventListener('click',function(){
    var ta=document.getElementById('eBody');var pos=ta.selectionStart;
    var snippet='';
    if(b.dataset.insert==='img') snippet='\n<img src="URL_ФОТО" alt="Описание" style="width:100%;border-radius:12px;margin:16px 0">\n';
    else if(b.dataset.insert==='table') snippet='\n<table>\n<thead><tr><th>Параметр</th><th>Значение</th></tr></thead>\n<tbody><tr><td>Пример</td><td>Данные</td></tr></tbody>\n</table>\n';
    ta.value=ta.value.substring(0,pos)+snippet+ta.value.substring(pos);
    ta.focus();updatePreview();
  });
});

// Live preview
document.getElementById('eBody').addEventListener('input',updatePreview);

})();
</script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{title}} | EcoStroyDom</title>
<meta name="description" content="{{description}}">
<meta name="keywords" content="{{keywords}}">
<link rel="canonical" href="https://ecostroydom.kz/blog/{{slug}}.html">
<meta name="robots" content="index, follow">

<!-- OpenGraph -->
<meta property="og:type" content="article">
<meta property="og:title" content="{{title}}">
<meta property="og:description" content="{{description}}">
<meta property="og:image" content="https://ecostroydom.kz/{{ogImage}}">
<meta property="og:url" content="https://ecostroydom.kz/blog/{{slug}}.html">
<meta property="og:locale" content="ru_KZ">
<meta property="article:published_time" content="{{datePublished}}T10:00:00+05:00">
<meta property="article:section" content="{{category}}">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/reset.css">
<link rel="stylesheet" href="../assets/css/main.css?v=67">
<script src="/assets/js/theme-renderer.js?v=1"></script>
<link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">

<!-- JSON-LD: Article -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{titleJson}}",
  "description": "{{descriptionJson}}",
  "image": "https://ecostroydom.kz/{{ogImage}}",
  "author": {"@type": "Organization", "name": "EcoStroyDom"},
  "publisher": {"@type": "Organization", "name": "EcoStroyDom", "logo": {"@type": "ImageObject", "url": "https://ecostroydom.kz/assets/icons/favicon.svg"}},
  "datePublished": "{{datePublished}}",
  "dateModified": "{{datePublished}}",
  "mainEntityOfPage": "https://ecostroydom.kz/blog/{{slug}}.html"
}
</script>

<!-- JSON-LD: BreadcrumbList -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {"@type": "ListItem", "position": 1, "name": "Главная", "item": "https://ecostroydom.kz/"},
    {"@type": "ListItem", "position": 2, "name": "Блог", "item": "https://ecostroydom.kz/#blog"},
    {"@type": "ListItem", "position": 3, "name": "{{titleJson}}"}
  ]
}
</script>

<style>
  .article{max-width:820px;margin:0 auto;padding:40px 24px 80px}
  .article__breadcrumb{font-size:13px;color:var(--muted);margin-bottom:24px;display:flex;gap:8px;flex-wrap:wrap}
  .article__breadcrumb a{color:var(--accent)}
  .article__breadcrumb span{color:var(--muted)}
  .article__cat{display:inline-block;padding:4px 12px;background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:600;border-radius:999px;margin-bottom:12px}
  .article__date{font-size:13px;color:var(--muted);margin-bottom:24px}
  .article h1{font-size:clamp(28px,4vw,42px);line-height:1.15;margin-bottom:16px}
  .article__lead{font-size:18px;color:var(--text-secondary);line-height:1.7;margin-bottom:32px}
  .article__hero{width:100%;border-radius:4px;margin-bottom:32px;aspect-ratio:16/9;object-fit:cover}
  .article h2{font-size:clamp(22px,3vw,28px);margin:40px 0 16px;padding-left:16px;border-left:3px solid var(--accent);line-height:1.2}
  .article h3{font-size:20px;margin:28px 0 12px}
  .article p{font-size:16px;color:var(--text-secondary);line-height:1.8;margin-bottom:16px}
  .article p b,.article li b{color:var(--text)}
  .article ul,.article ol{margin:16px 0;padding-left:24px}
  .article li{font-size:15px;color:var(--text-secondary);line-height:1.7;margin-bottom:8px}
  .article img.inline{width:100%;border-radius:3px;margin:24px 0}
  .article__table{width:100%;border-collapse:collapse;margin:24px 0;font-size:14px}
  .article__table th{text-align:left;padding:12px 16px;background:var(--bg-soft);font-weight:700;color:var(--text);border-bottom:2px solid var(--accent)}
  .article__table td{padding:10px 16px;border-bottom:1px solid var(--bg-soft)}
  .article__table tr:hover td{background:var(--accent-light)}
  .article__cta{margin:40px 0;padding:32px;background:var(--bg-soft);border-radius:4px;text-align:center}
  .article__cta h3{margin:0 0 8px;font-size:22px}
  .article__cta p{color:var(--muted);margin-bottom:16px}
  .article__back{display:inline-flex;align-items:center;gap:8px;color:var(--accent);font-weight:600;font-size:14px;margin-top:32px}
  .article__back:hover{gap:12px}
  .article__tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:24px}
  .article__tag{padding:6px 14px;background:var(--bg-soft);border-radius:999px;font-size:12px;color:var(--muted)}

  .blog-header{background:var(--bg);border-bottom:1px solid var(--border);padding:16px 0}
  .blog-header__inner{max-width:820px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
  .blog-header__logo{font-family:'Manrope';font-size:20px;font-weight:800}
  .blog-header__logo b{color:var(--accent)}
</style>
